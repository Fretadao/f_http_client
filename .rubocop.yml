plugins:
  - rubocop-rspec
  - rubocop-performance
  - rubocop-vicenzo

AllCops:
  TargetRubyVersion: 3.2
  SuggestExtensions: false
  NewCops: enable
  CacheRootDirectory: tmp
  Exclude:
    - 'vendor/**/*'
    - 'bin/**/*'
    - '.git/**/*'
    - 'examples/**/*'

##### LAYOUT #####

Layout/ArgumentAlignment:
  Enabled: true
  EnforcedStyle: with_fixed_indentation

Layout/FirstArgumentIndentation:
  Enabled: true
  EnforcedStyle: consistent

Layout/FirstArrayElementIndentation:
  Enabled: true
  EnforcedStyle: consistent

Layout/FirstHashElementIndentation:
  Enabled: true
  EnforcedStyle: consistent

Layout/FirstMethodArgumentLineBreak:
  Enabled: true

Layout/LineLength:
  Max: 120
  AllowedPatterns: ['(\A|\s)#']

Layout/MultilineMethodArgumentLineBreaks:
  Enabled: true

Layout/MultilineMethodCallBraceLayout:
  Enabled: true
  EnforcedStyle: new_line

Layout/MultilineMethodCallIndentation:
  Enabled: true
  EnforcedStyle: indented

Layout/FirstArrayElementLineBreak:
  Enabled: true

Layout/MultilineArrayLineBreaks:
  Enabled: true

Layout/MultilineArrayBraceLayout:
  Enabled: true
  EnforcedStyle: new_line

Layout/FirstHashElementLineBreak:
  Enabled: true

Layout/MultilineHashKeyLineBreaks:
  Enabled: true

Layout/MultilineHashBraceLayout:
  Enabled: true
  EnforcedStyle: new_line

##### STYLE #####

Style/PreferredHashMethods:
  Enabled: true
  Safe: false
  EnforcedStyle: verbose

Style/SymbolArray:
  Enabled: true
  EnforcedStyle: percent
  MinSize: 3

Style/WordArray:
  Enabled: true
  EnforcedStyle: percent
  MinSize: 3

Style/MultilineBlockChain:
  Enabled: false

Style/Lambda:
  Enabled: true
  EnforcedStyle: literal

Style/LambdaCall:
  Enabled: false

Style/Documentation:
  Enabled: false

##### LINT #####

Lint/MissingSuper:
  Enabled: false

##### NAMING #####

Naming/InclusiveLanguage:
  Enabled: false

Naming/PredicatePrefix:
  ForbiddenPrefixes:
    - is_
    - have_
    # allows `has_` predicate

###### METRICS #####

Metrics/AbcSize:
  Enabled: true
  Max: 22

Metrics/BlockLength:
  Enabled: true
  CountComments: false
  Exclude:
    - '**/*.gemspec'
    - 'spec/**/*'

Metrics/ClassLength:
  Max: 200

Metrics/MethodLength:
  Enabled: true
  CountAsOne: ['array', 'heredoc']
  Max: 20

##### RSPEC #####

RSpec/ContextWording:
  Prefixes:
    - and
    - but
    - when
    - with
    - without

RSpec/ExampleLength:
  Max: 20

RSpec/MultipleExpectations:
  Exclude:
    - 'spec/f_http_client/rspec/matchers/**/*'

  # This directory contains specs for custom RSpec matchers.
  # These examples intentionally use nested `expect { ... }.to raise_error(...)`
  # to assert on matcher failure messages, which inherently requires more than
  # one `expect` per example and conflicts with the MultipleExpectations cop.
  #
  # Using `:aggregate_failures` here is not an option, because it captures the
  # inner expectation failure and re-raises an aggregated error, so the outer
  # `raise_error` matcher no longer sees the original `ExpectationNotMetError`
  # and the specs for the failure messages become impossible to express.

RSpec/MultipleMemoizedHelpers:
  Enabled: false

RSpec/NestedGroups:
  Enabled: false

RSpec/SpecFilePathFormat:
  CustomTransform:
    FHTTPClient: f_http_client

##### RUBYGEMS #####
Gemspec/RequireMFA:
  Enabled: false

##### Vicenzo #####

Vicenzo/Style/MultilineMethodCallParentheses:
  AllowedMethods:
    - to
    - not_to
    - to_not
